<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 740" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrSimp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1E2761"/>
    </marker>
    <marker id="arrSimpA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/>
    </marker>
  </defs>
  <style>
    .H  { font-size: 32px; fill: #1E2761; font-weight: 700; }
    .h  { font-size: 22px; fill: #1E2761; font-weight: 700; }
    .t  { font-size: 18px; fill: #1E293B; }
    .m  { font-size: 16px; fill: #64748B; font-style: italic; }
    .lbl{ font-size: 18px; fill: #1E2761; font-weight: 600; }
    .acc{ font-size: 14px; fill: #F59E0B; font-weight: 700; letter-spacing: 2px; }
  </style>

  <!-- Title -->
  <text x="700" y="56" class="H" text-anchor="middle">Cross-attention surgery on Qwen3-8B</text>
  <text x="700" y="90" class="m" text-anchor="middle">Frozen language model reads the narrative; gated cross-attention fuses a side-stream of structured events</text>

  <!-- Layout: 5 stages in a single row, large boxes, generous spacing.
       Box width: 200, height: 200, gap: 40, total horizontal: 5*200 + 4*40 = 1160.
       Centered: x_start = (1400 - 1160) / 2 = 120.
       Vertical center y: 320 (so boxes span 220-420) -->

  <!-- ============== STAGE 1: Narrative path ============== -->
  <g transform="translate(120, 220)">
    <rect width="200" height="200" rx="12" fill="#EFF6FF" stroke="#1E2761" stroke-width="2"/>
    <text x="100" y="40" class="acc" text-anchor="middle">TEXT  PATH</text>
    <text x="100" y="88" class="lbl" text-anchor="middle">Narrative</text>
    <text x="100" y="116" class="lbl" text-anchor="middle">+ verdict</text>
    <text x="100" y="158" class="m" text-anchor="middle" font-size="14">analyst-style prose</text>
    <text x="100" y="178" class="m" text-anchor="middle" font-size="14">of the session</text>
  </g>

  <!-- ============== ARROW 1 -->
  <line x1="325" y1="320" x2="358" y2="320" stroke="#1E2761" stroke-width="3" marker-end="url(#arrSimp)"/>

  <!-- ============== STAGE 2: Frozen LM ============== -->
  <g transform="translate(360, 220)">
    <rect width="200" height="200" rx="12" fill="#1E2761"/>
    <text x="100" y="40" class="acc" text-anchor="middle" fill="#F59E0B">FROZEN  LM</text>
    <text x="100" y="88" class="lbl" text-anchor="middle" fill="#FFFFFF">Qwen3-8B</text>
    <text x="100" y="116" class="lbl" text-anchor="middle" fill="#FFFFFF">+ CPT-light</text>
    <text x="100" y="158" class="m" text-anchor="middle" fill="#CADCFC" font-size="14">8 B parameters</text>
    <text x="100" y="178" class="m" text-anchor="middle" fill="#CADCFC" font-size="14">no gradient updates</text>
  </g>

  <!-- ============== ARROW 2 -->
  <line x1="565" y1="320" x2="598" y2="320" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrSimpA)"/>

  <!-- ============== STAGE 3: Gated cross-attention ============== -->
  <g transform="translate(600, 220)">
    <rect width="200" height="200" rx="12" fill="#F59E0B"/>
    <text x="100" y="40" class="acc" text-anchor="middle" fill="#1E2761">FUSION</text>
    <text x="100" y="88" class="lbl" text-anchor="middle">Gated</text>
    <text x="100" y="116" class="lbl" text-anchor="middle">cross-attention</text>
    <text x="100" y="158" class="m" text-anchor="middle" font-size="14" fill="#1E2761">inserted layers in LM</text>
    <text x="100" y="178" class="m" text-anchor="middle" font-size="14" fill="#1E2761">per-layer tanh(α) gate</text>
  </g>

  <!-- ============== ARROW 3 -->
  <line x1="805" y1="320" x2="838" y2="320" stroke="#1E2761" stroke-width="3" marker-end="url(#arrSimp)"/>

  <!-- ============== STAGE 4: Risk head ============== -->
  <g transform="translate(840, 220)">
    <rect width="200" height="200" rx="12" fill="#1E2761"/>
    <text x="100" y="40" class="acc" text-anchor="middle" fill="#F59E0B">SCORE</text>
    <text x="100" y="88" class="lbl" text-anchor="middle" fill="#FFFFFF">Risk verdict</text>
    <text x="100" y="116" class="lbl" text-anchor="middle" fill="#FFFFFF">head</text>
    <text x="100" y="158" class="m" text-anchor="middle" fill="#CADCFC" font-size="14">log P(' fraud')</text>
    <text x="100" y="178" class="m" text-anchor="middle" fill="#CADCFC" font-size="14">− log P(' legit')</text>
  </g>

  <!-- ============== STAGE 5: Side-stream feeder (bottom-up into Fusion) ============== -->
  <!-- Side encoder + resampler shown as a single stacked block below the FUSION box -->
  <g transform="translate(600, 470)">
    <rect width="200" height="200" rx="12" fill="#FFFFFF" stroke="#0D9488" stroke-width="2"/>
    <text x="100" y="36" class="acc" text-anchor="middle" fill="#0D9488">SIDE  STREAM</text>

    <text x="100" y="76" class="lbl" text-anchor="middle">Side encoder</text>
    <text x="100" y="98" class="m" text-anchor="middle" font-size="14">small_transformer (6 L)</text>

    <line x1="40" y1="115" x2="160" y2="115" stroke="#E2E8F0"/>

    <text x="100" y="140" class="lbl" text-anchor="middle">Perceiver-Resampler</text>
    <text x="100" y="162" class="m" text-anchor="middle" font-size="14">compresses to K/V slots</text>
    <text x="100" y="186" class="m" text-anchor="middle" fill="#0D9488" font-size="14" font-weight="700">N ∈ {32, 64, 128}</text>
  </g>

  <!-- Side-stream → Fusion arrow (upward) -->
  <line x1="700" y1="470" x2="700" y2="425" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrSimpA)"/>

  <!-- Event stream input feeding into side encoder (drawn at far left bottom) -->
  <g transform="translate(120, 510)">
    <rect width="200" height="120" rx="12" fill="#EFF6FF" stroke="#1E2761" stroke-width="2"/>
    <text x="100" y="36" class="acc" text-anchor="middle">EVENT  PATH</text>
    <text x="100" y="72" class="lbl" text-anchor="middle">Structured events</text>
    <text x="100" y="100" class="m" text-anchor="middle" font-size="14">login · txn · pw_reset · ...</text>
  </g>

  <!-- Event-stream → side encoder arrow -->
  <path d="M325,565 C420,565 500,565 598,565" fill="none" stroke="#1E2761" stroke-width="3" marker-end="url(#arrSimp)"/>

  <!-- ============== BOTTOM SUMMARY STRIP ============== -->
  <g transform="translate(120, 700)">
    <text x="0" y="0" class="m" font-size="13" fill="#1E2761" font-weight="600" text-anchor="start">
      The only base-touching trainable is a small LoRA-on-Q (r=16) on Qwen3's query projection. Everything else lives outside the frozen LM.
    </text>
  </g>
</svg>
