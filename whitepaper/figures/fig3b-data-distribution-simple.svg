<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" font-family="Inter, Helvetica, Arial, sans-serif">
  <style>
    .H  { font-size: 32px; fill: #1E2761; font-weight: 700; }
    .h  { font-size: 22px; fill: #1E2761; font-weight: 700; }
    .t  { font-size: 18px; fill: #1E293B; }
    .m  { font-size: 16px; fill: #64748B; font-style: italic; }
    .lbl{ font-size: 16px; fill: #1E2761; font-weight: 700; }
    .num{ font-size: 18px; fill: #FFFFFF; font-weight: 700; }
    .acc{ font-size: 14px; fill: #F59E0B; font-weight: 700; letter-spacing: 2px; }
  </style>

  <!-- Title -->
  <text x="700" y="56" class="H" text-anchor="middle">Synthetic ATO data — what's in the training pool</text>
  <text x="700" y="90" class="m" text-anchor="middle">25,000 LLM-narrated pairs · 5,002-row stratified eval · the two v4-NEW adversarial families are where cross-attention earned the win</text>

  <!-- ============== PANEL A: Class balance (top, full width) ============== -->
  <g transform="translate(80, 140)">
    <text x="0" y="0" class="h">A.  Class balance</text>
    <text x="0" y="28" class="m" font-size="14">training pool, n = 25,000</text>

    <g transform="translate(0, 48)">
      <rect width="1240" height="64" fill="#F1F5F9" stroke="#94A3B8"/>
      <rect width="496" height="64" fill="#DC2626"/>
      <text x="248" y="40" class="num" text-anchor="middle" font-size="22">Fraud · 40 % · 10,000</text>
      <rect x="496" width="372" height="64" fill="#F59E0B"/>
      <text x="682" y="40" class="num" text-anchor="middle" font-size="22">Hard-neg · 30 % · 7,500</text>
      <rect x="868" width="372" height="64" fill="#0D9488"/>
      <text x="1054" y="40" class="num" text-anchor="middle" font-size="22">Legit · 30 % · 7,500</text>
    </g>
  </g>

  <!-- ============== PANEL B: Three key journey families (focus on v4-new adversarial pair) ============== -->
  <g transform="translate(80, 320)">
    <text x="0" y="0" class="h">B.  Three families that decide the v5 result</text>
    <text x="0" y="28" class="m" font-size="14">the v4 pivot added the two adversarial families on the right — they are where cross-attention separated from text-only</text>

    <!-- Three large cards side-by-side -->
    <g transform="translate(0, 50)">
      <!-- Card 1: clean (baseline) -->
      <g>
        <rect width="400" height="240" rx="10" fill="#FFFFFF" stroke="#0D9488" stroke-width="2"/>
        <rect width="8" height="240" fill="#0D9488"/>
        <text x="200" y="32" class="acc" text-anchor="middle" fill="#0D9488">EASY  LEGIT</text>
        <text x="200" y="68" class="lbl" text-anchor="middle" font-size="20">clean</text>
        <text x="200" y="92" class="m" text-anchor="middle" font-size="14">~7,500 training rows</text>

        <line x1="32" y1="112" x2="368" y2="112" stroke="#E2E8F0"/>

        <text x="200" y="142" class="t" text-anchor="middle" font-size="16" font-weight="600">Both arms solve it.</text>
        <text x="32" y="172" class="m" font-size="14">text_only recall:</text>
        <text x="368" y="172" class="lbl" text-anchor="end" fill="#0D9488" font-size="16">1.00</text>
        <text x="32" y="194" class="m" font-size="14">x-attn recall:</text>
        <text x="368" y="194" class="lbl" text-anchor="end" fill="#0D9488" font-size="16">1.00</text>
        <text x="32" y="222" class="m" font-size="13" font-style="italic">(saturated; no signal)</text>
      </g>

      <!-- Card 2: phish_takeover_mfa_phished (the v4-NEW fraud-dual) -->
      <g transform="translate(420, 0)">
        <rect width="400" height="240" rx="10" fill="#FFFFFF" stroke="#DC2626" stroke-width="2"/>
        <rect width="8" height="240" fill="#DC2626"/>
        <text x="200" y="32" class="acc" text-anchor="middle" fill="#DC2626">v4-NEW  ·  ADVERSARIAL  FRAUD</text>
        <text x="200" y="68" class="lbl" text-anchor="middle" font-size="20">phish_takeover_mfa_phished</text>
        <text x="200" y="92" class="m" text-anchor="middle" font-size="14">~400 training rows  ·  71 in eval</text>

        <line x1="32" y1="112" x2="368" y2="112" stroke="#E2E8F0"/>

        <text x="200" y="138" class="t" text-anchor="middle" font-size="14">text reads safe; events show anomaly</text>
        <text x="200" y="158" class="m" text-anchor="middle" font-size="13" font-style="italic">"recipient added 20 min ago"</text>
        <text x="32" y="184" class="m" font-size="14">text_only recall:</text>
        <text x="368" y="184" class="lbl" text-anchor="end" fill="#DC2626" font-size="16">0.00</text>
        <text x="32" y="208" class="m" font-size="14">x-attn recall:</text>
        <text x="368" y="208" class="lbl" text-anchor="end" fill="#0D9488" font-size="18">0.97 ✓</text>
        <text x="200" y="230" class="m" font-size="13" text-anchor="middle" font-weight="600" fill="#0D9488">CI-separated  ·  the win</text>
      </g>

      <!-- Card 3: hn_recovery_high_amount (the v4-NEW adversarial-legitimate ceiling) -->
      <g transform="translate(840, 0)">
        <rect width="400" height="240" rx="10" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
        <rect width="8" height="240" fill="#F59E0B"/>
        <text x="200" y="32" class="acc" text-anchor="middle" fill="#F59E0B">v4-NEW  ·  ADVERSARIAL  LEGIT</text>
        <text x="200" y="68" class="lbl" text-anchor="middle" font-size="20">hn_recovery_high_amount</text>
        <text x="200" y="92" class="m" text-anchor="middle" font-size="14">~500 training rows  ·  78 in eval</text>

        <line x1="32" y1="112" x2="368" y2="112" stroke="#E2E8F0"/>

        <text x="200" y="138" class="t" text-anchor="middle" font-size="14">text reads fraud; events reveal legitimacy</text>
        <text x="200" y="158" class="m" text-anchor="middle" font-size="13" font-style="italic">large transfer to user's other account</text>
        <text x="32" y="184" class="m" font-size="14">text_only FPR:</text>
        <text x="368" y="184" class="lbl" text-anchor="end" fill="#DC2626" font-size="16">0.99</text>
        <text x="32" y="208" class="m" font-size="14">x-attn FPR:</text>
        <text x="368" y="208" class="lbl" text-anchor="end" fill="#DC2626" font-size="16">1.00</text>
        <text x="200" y="230" class="m" font-size="13" text-anchor="middle" font-weight="600" fill="#F59E0B">both fail  ·  the v5 ceiling</text>
      </g>
    </g>
  </g>

  <!-- ============== BOTTOM: token-family legend strip ============== -->
  <g transform="translate(80, 638)">
    <text x="0" y="-12" class="m" font-size="14" font-weight="600" fill="#1E2761">Three token families  ·  visibility regime</text>

    <g transform="translate(0, 0)">
      <rect width="14" height="14" fill="#1E2761"/>
      <text x="22" y="11" class="t" font-size="13" font-weight="700">PII-fencing</text>
      <text x="22" y="28" class="m" font-size="12">always visible · hygiene only</text>
    </g>

    <g transform="translate(360, 0)">
      <rect width="14" height="14" fill="#0D9488"/>
      <text x="22" y="11" class="t" font-size="13" font-weight="700">Bucketed features</text>
      <text x="22" y="28" class="m" font-size="12">always visible · the fraud signal</text>
    </g>

    <g transform="translate(720, 0)">
      <rect width="14" height="14" fill="#F59E0B"/>
      <text x="22" y="11" class="t" font-size="13" font-weight="700">Journey / actor tokens</text>
      <text x="22" y="28" class="m" font-size="12">stripped or opacified at eval</text>
    </g>
  </g>
</svg>
