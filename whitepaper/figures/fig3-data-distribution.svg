          <text x="0" y="0" class="row" fill="#F59E0B">hn_recovery_high_amount</text>
          <text x="0" y="16" class="m" font-size="11">v4 NEW — adversarial-legit</text>
          <text x="0" y="30" class="m" font-size="11">text looks fraud</text>
        </g>
        <rect x="0"   y="0" width="110" height="46" fill="#F59E0B" opacity="0.50" stroke="#F59E0B" stroke-width="2"/><text x="55"  y="29" class="num" text-anchor="middle">500</text>
        <rect x="110" y="0" width="110" height="46" fill="#F1F5F9" stroke="#F59E0B" stroke-width="2"/><text x="165" y="29" class="nb" text-anchor="middle">·</text>
        <rect x="220" y="0" width="110" height="46" fill="#F59E0B" opacity="0.20" stroke="#F59E0B" stroke-width="2"/><text x="275" y="29" class="num" text-anchor="middle">100</text>
        <rect x="330" y="0" width="110" height="46" fill="#F1F5F9" stroke="#F59E0B" stroke-width="2"/><text x="385" y="29" class="nb" text-anchor="middle">·</text>
        <rect x="440" y="0" width="110" height="46" fill="#F1F5F9" stroke="#F59E0B" stroke-width="2"/><text x="495" y="29" class="nb" text-anchor="middle">·</text>
        <rect x="550" y="0" width="110" height="46" fill="#F1F5F9" stroke="#F59E0B" stroke-width="2"/><text x="605" y="29" class="nb" text-anchor="middle">·</text>
      </g>

      <!-- ROW 8: hn_travel + hn_large_purchase combined -->
      <g transform="translate(0, 378)">
        <g transform="translate(-280, 22)">
          <text x="0" y="0" class="row">hn_travel + hn_large_purchase</text>
          <text x="0" y="16" class="m" font-size="11">(legit, look like fraud)</text>
        </g>
        <rect x="0"   y="0" width="110" height="46" fill="#F59E0B" opacity="0.45"/><text x="55"  y="29" class="num" text-anchor="middle">1000</text>
        <rect x="110" y="0" width="110" height="46" fill="#F59E0B" opacity="0.20"/><text x="165" y="29" class="num" text-anchor="middle">100</text>
        <rect x="220" y="0" width="110" height="46" fill="#F59E0B" opacity="0.20"/><text x="275" y="29" class="num" text-anchor="middle">100</text>
        <rect x="330" y="0" width="110" height="46" fill="#F1F5F9"/><text x="385" y="29" class="nb" text-anchor="middle">·</text>
        <rect x="440" y="0" width="110" height="46" fill="#F1F5F9"/><text x="495" y="29" class="nb" text-anchor="middle">·</text>
        <rect x="550" y="0" width="110" height="46" fill="#F1F5F9"/><text x="605" y="29" class="nb" text-anchor="middle">·</text>
