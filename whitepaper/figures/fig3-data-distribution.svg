  <!-- ============== ROW 3: PANEL D - Token families (bottom, separate from heatmap) ============== -->
  <g transform="translate(60, 910)">
    <text x="0" y="0" class="h">D.  Three token families  ·  visibility per eval mode</text>

    <g transform="translate(0, 18)">
      <rect width="425" height="64" rx="6" fill="#FFFFFF" stroke="#1E2761" stroke-width="1.5"/>
      <rect width="6" height="64" fill="#1E2761"/>
      <text x="20" y="22" class="t" font-weight="700" font-size="14">PII-fencing tokens</text>
      <text x="20" y="40" class="code" font-size="11">&lt;acct_id&gt; &lt;email&gt; &lt;device_id&gt; &lt;ip&gt; &lt;phone&gt;</text>
      <text x="20" y="56" class="m" font-size="11">always visible (no signal leak — hygiene only)</text>
    </g>

    <g transform="translate(450, 18)">
      <rect width="425" height="64" rx="6" fill="#FFFFFF" stroke="#0D9488" stroke-width="1.5"/>
      <rect width="6" height="64" fill="#0D9488"/>
      <text x="20" y="22" class="t" font-weight="700" font-size="14">Bucketed feature tokens  ·  the fraud signal</text>
      <text x="20" y="40" class="code" font-size="11">amount_bucket geo_distance ip_risk device_age ...</text>
      <text x="20" y="56" class="m" font-size="11">visible in events; v4 removed from narrator's view</text>
    </g>

    <g transform="translate(900, 18)">
      <rect width="425" height="64" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5"/>
      <rect width="6" height="64" fill="#F59E0B"/>
      <text x="20" y="22" class="t" font-weight="700" font-size="14">Journey / actor structural tokens</text>
      <text x="20" y="40" class="code" font-size="11">&lt;journey_*&gt; … &lt;/journey_*&gt;   &lt;actor_*&gt;</text>
      <text x="20" y="56" class="m" font-size="11">stripped or opacified at eval time</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="700" y="1060" class="m" text-anchor="middle">Counts in panel B are approximate per-cell ratios used by the v4 generator; blank cells are intentionally empty journey × actor combinations.</text>
</svg>
