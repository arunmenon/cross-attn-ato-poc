      <g transform="translate(0, 270)">
        <g transform="translate(-280, 22)">
          <text x="0" y="0" class="row">hn_account_recovery</text>
          <text x="0" y="16" class="m" font-size="11">(legit, looks like phish)</text>
        </g>
        <rect x="0"   y="0" width="110" height="46" fill="#F59E0B" opacity="0.50"/><text x="55"  y="29" class="num" text-anchor="middle">700</text>
        <rect x="110" y="0" width="110" height="46" fill="#F1F5F9"/><text x="165" y="29" class="nb" text-anchor="middle">·</text>
        <rect x="220" y="0" width="110" height="46" fill="#F59E0B" opacity="0.15"/><text x="275" y="29" class="num" text-anchor="middle">100</text>
        <rect x="330" y="0" width="110" height="46" fill="#F1F5F9"/><text x="385" y="29" class="nb" text-anchor="middle">·</text>
        <rect x="440" y="0" width="110" height="46" fill="#F1F5F9"/><text x="495" y="29" class="nb" text-anchor="middle">·</text>
        <rect x="550" y="0" width="110" height="46" fill="#F1F5F9"/><text x="605" y="29" class="nb" text-anchor="middle">·</text>
      </g>

      <!-- ROW 7: hn_recovery_high_amount (v4 NEW) -->
      <g transform="translate(0, 324)">
