exp_id: exp_v5_p2_ft_transformer
arm: xattn

xattn:
  insertion_pattern: every_8
  gate_init: zero
  resampler_slots: 64
  encoder: ft_transformer
  lora_r_on_q: 16

training:
  base_checkpoint: /workspace/checkpoints/qwen3-8b-cpt-light-v4-merged
  steps: 1500
  seq_len: 2048
  micro_batch: 4
  grad_accum: 8
  lr: 1.0e-4
  warmup_steps: 500
  precision: bf16
  optimizer: paged_adamw_8bit
  stress_run: false

data:
  train_path: /workspace/data/train_llm_narrated_v4
  eval_fast_path: /workspace/data/train_llm_narrated_v4
  eval_mode_dropout:
    full: 0.50
    opaque: 0.25
    stripped: 0.25

eval:
  modes: [stripped, opaque, full]
  primary_mode: stripped
  bootstrap_resamples: 1000
  per_journey_breakdown: true
  per_actor_breakdown: true
  hard_negative_fpr: true

rationale: |
  V5 Phase 2, item 2. Base = Phase 1 winner = exp_v5_p1_zero_64
  (every_8 / gate=zero / slots=64 / lora_r_on_q=16 / lr=1e-4).
  Swaps encoder from small_transformer to ft_transformer. Tests whether a
  feature-tokenizer-style transformer (FTTransformer) with learned tabular-style
  embeddings per event feature improves over the shared-embedding small_transformer.

  pooled_mlp (Phase 2 item 1) scored v5_adv_error=0.1549 vs winner 0.1506 —
  no significant improvement (CIs overlap). ft_transformer is the second Phase 2
  probe. If ft_transformer also fails to beat the Phase 1 winner by 0.005
  absolute v5_adv_error, the Phase 2 stop rule fires.

  Dedup check: (every_8, zero, 64, ft_transformer, 16, 1e-4, 500, 1500,
  2048) does not match any prior row in experiments.jsonl.
