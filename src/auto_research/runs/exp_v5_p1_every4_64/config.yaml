exp_id: exp_v5_p1_every4_64
arm: xattn

xattn:
  insertion_pattern: every_4
  gate_init: small_0.01
  resampler_slots: 64
  encoder: small_transformer
  lora_r_on_q: 16

training:
  base_checkpoint: /workspace/checkpoints/qwen3-8b-cpt-light-v4-merged
  steps: 1500
  seq_len: 2048
  micro_batch: 4
  grad_accum: 8
  lr: 1.0e-4
  warmup_steps: 500
  precision: bf16
  optimizer: paged_adamw_8bit
  stress_run: false

data:
  train_path: /workspace/data/train_llm_narrated_v4
  eval_fast_path: /workspace/data/train_llm_narrated_v4
  eval_mode_dropout:
    full: 0.50
    opaque: 0.25
    stripped: 0.25

eval:
  modes: [stripped, opaque, full]
  primary_mode: stripped
  bootstrap_resamples: 1000
  per_journey_breakdown: true
  per_actor_breakdown: true
  hard_negative_fpr: true

rationale: |
  V5 Phase 1, item 1. Probing insertion_pattern=every_4 vs the baseline
  exp_xattn_v4_001 which used every_8. every_4 inserts 6 x-attn layers
  (vs 3 for every_8), doubling the cross-attn capacity at the cost of
  ~2x additional trainable parameters in the cross-attn pathway.

  Key question: does more frequent cross-attn injection improve
  hn_recovery_high_amount FPR (currently 0.451 CI [0.369, 0.562]) or
  phish_takeover_mfa_phished recall (currently 0.972)? The v5_adv_error
  baseline is 0.160; a meaningful win requires ≥0.005 absolute reduction.

  All other hyperparameters are held identical to exp_xattn_v4_001
  to isolate the insertion_pattern effect.
