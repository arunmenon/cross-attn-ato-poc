exp_id: exp_v5_p1_rank32
arm: xattn

xattn:
  insertion_pattern: every_8
  gate_init: zero
  resampler_slots: 64
  encoder: small_transformer
  lora_r_on_q: 32

training:
  base_checkpoint: /workspace/checkpoints/qwen3-8b-cpt-light-v4-merged
  steps: 1500
  seq_len: 2048
  micro_batch: 4
  grad_accum: 8
  lr: 1.0e-4
  warmup_steps: 500
  precision: bf16
  optimizer: paged_adamw_8bit
  stress_run: false

data:
  train_path: /workspace/data/train_llm_narrated_v4
  eval_fast_path: /workspace/data/train_llm_narrated_v4
  eval_mode_dropout:
    full: 0.50
    opaque: 0.25
    stripped: 0.25

eval:
  modes: [stripped, opaque, full]
  primary_mode: stripped
  bootstrap_resamples: 1000
  per_journey_breakdown: true
  per_actor_breakdown: true
  hard_negative_fpr: true

rationale: |
  V5 Phase 1, item 8 (rank32). Base = best so far = exp_v5_p1_zero_64
  (every_8 / gate=zero / slots=64 / small_transformer / lr=1e-4). Tests
  whether doubling the LoRA rank on Q projections (16 -> 32) helps the LM
  adapt its attention to the cross-attention signal more precisely.

  Context: All Phase 1 configs so far use lora_r_on_q=16. Rank 32 gives the
  LM twice as many trainable dimensions to integrate cross-attention outputs,
  at the cost of ~8M more parameters (~7% increase). If the bottleneck is
  LM adaptation capacity rather than event encoding, rank 32 should help.

  Dedup check: (every_8, zero, 64, small_transformer, 32, 1e-4, 500, 1500,
  2048) does not match any prior row in experiments.jsonl (all prior have
  lora_r_on_q=16).
