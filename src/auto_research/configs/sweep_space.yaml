# Sweep space for the V5 auto-research loop on v4 data.
# V5 uses the shared v4 merged base and data; no data generation or Stage-0 retraining.

dials:
  insertion_pattern:
    values: [every_4, every_8, late_only]
    description: |
      Where to insert gated cross-attention layers in the Qwen3-8B stack.
      every_4   — every 4th layer starting from layer 12 (6 x-attn layers)
      every_8   — every 8th layer starting from layer 12 (3 x-attn layers)
      late_only — last 4 layers only (4 x-attn layers, cheap)

  gate_init:
    values: [zero, small_0.01]
    description: |
      Initial value of tanh(alpha) gating coefficient.
      zero       — true Flamingo init, base LM is preserved exactly at step 0
      small_0.01 — slight initial signal, sometimes trains faster

  resampler_slots:
    values: [32, 64, 128]
    description: |
      Perceiver-Resampler output length. Number of compressed K/V tokens
      the LM cross-attends to per session.

  encoder:
    values: [small_transformer, pooled_mlp, ft_transformer]
    description: |
      Side-stream encoder family. V5 Phase 1 holds small_transformer fixed;
      Phase 2 compares pooled_mlp and ft_transformer after the registry is present.

# Fixed (no sweep on Day 1-3):
fixed:
  base_model: Qwen3-8B
  precision: bf16
  optimizer: paged_adamw_8bit
  seq_len: 2048
  lora_r_on_q: 16
  steps_per_experiment: 1500
  data: /workspace/data/train_llm_narrated_v4
  base_checkpoint: /workspace/checkpoints/qwen3-8b-cpt-light-v4-merged

# Deferred to Day 4+:
deferred:
  insertion_pattern: [every_2]
  gate_init: [learnable]
  resampler_slots: [256]
  encoder: [cnn_lstm]

# V5 does not run the full Cartesian product. See AGENT_INSTRUCTIONS.md for the
# ordered Phase 1/Phase 2 queue and adaptive LR/rank follow-ups.
